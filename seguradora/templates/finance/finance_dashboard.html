{% extends "base.html" %}

{% block content %}
    <section class="w-full h-full">
        <section class="w-full p-4 px-6 flex gap-6 items-center">
            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total de Lucros</label>
                    <span class="text-3xl font-semibold">R$ {{ total_income }}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="banknote-arrow-up"></i>
                </div>
            </div>

            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total de Pagamentos</label>
                    <span class="text-3xl font-semibold">R$ {{ total_cover }}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="banknote-arrow-down"></i>
                </div>
            </div>

            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total Parado</label>
                    <span class="text-3xl font-semibold">R$ {{ total_barred }}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="banknote-x"></i>
                </div>
            </div>
        </section>
    </section>
{% endblock %}
