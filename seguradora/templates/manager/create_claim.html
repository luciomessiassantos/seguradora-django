{% extends "base.html" %}

{% block content %}
<section class="w-full h-full bg-background flex flex-col overflow-hidden">
    
    <header class="w-full px-6 py-4 border-b border-foreground bg-white shrink-0">
        <h1 class="text-3xl font-medium">Criar Sinistro</h1>
    </header>

    <div class="flex-1 overflow-y-auto p-6">
        <form method="post" class="max-w-4xl mx-auto bg-white rounded-lg border border-foreground shadow p-6 space-y-6">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in form %}
                <div class="flex flex-col gap-1">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                    <span class="text-red-500 text-sm">{{ field.errors|striptags }}</span>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="flex gap-3 pt-4 border-t border-t-foreground">
                <button type="submit" class="btn btn-primary bg-principal border-principal text-white">Salvar</button>
                <a href="{% url 'manager_dashboard' %}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</section>

{% endblock %}
