{% extends "base.html" %}
{% load moeda_br %}

{% block content %}
    <section class="w-full h-full p-4">
        <section class="w-full h-3/12 p-2 px-5 flex gap-4">
            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total de clientes</label>
                    <span class="text-3xl font-semibold">{{ total_customers }}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="user"></i>
                </div>
            </div>
            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total de apólices</label>
                    <span class="text-3xl font-semibold">{{total_policies}}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="file"></i>
                </div>
            </div>
            <div class="card h-full w-1/3 px-8 flex flex-row items-center justify-between bg-principal text-white">
                <div class="flex flex-col py-3  gap-6">
                    <label for="">Total de coberturas</label>
                    <span class="text-3xl font-semibold">R$ {{cover_total|br_money}}</span>
                </div>
                <div>
                    <i class="w-12 h-12" data-lucide="dollar-sign"></i>
                </div>
            </div>
        </section>
    </section>
{% endblock %}
