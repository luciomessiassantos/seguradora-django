

    <section class="w-full h-full flex">
        <main class="w-full h-full overflow-y-auto p-8 ">
            <label class="text-foreground">Exibindo {{ total_results }} resultados</label>
            {% if results %}
                {% for result in results %}
                    {% include "components/_policy.html" with policy=result %}
                {% endfor %}
            {% else %}
                <div class="w-full h-full flex items-center justify-center">
                    <h1 class="text-foreground">Sem resultados</h1>
                </div>
            {% endif %}
        </main>
    </section>
